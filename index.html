<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minion Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="stat">
                <span>🍌</span>
                <span id="bananas">0</span>
            </div>
            <div class="stat">
                <span>⭐️</span>
                <span id="level">1</span>
            </div>
            <div class="stat">
                <span>⚡️</span>
                <span id="energy">100</span>
                <span>/</span>
                <span id="energyMax">100</span>
            </div>
        </div>
        
        <div class="exp-bar">
            <div id="expFill" class="exp-fill"></div>
            <span id="expText">0/100</span>
        </div>
        
        <div class="minion" id="minion">
            🐵
            <div class="glasses">👓</div>
        </div>
        
        <div class="click-info">
            <span>💪 x<span id="clickPower">1</span></span>
            <span>✨ +<span id="bonus">0</span>%</span>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="clicker">🍌 Кликер</button>
            <button class="tab" data-tab="upgrades">🛠 Прокачки</button>
        </div>
        
        <div id="clicker" class="tab-content active">
            <div class="energy-info">
                <div class="energy-bar">
                    <div id="energyFill" class="energy-fill"></div>
                </div>
                <span>Энергия восстанавливается: +1/сек</span>
            </div>
            <div class="tip">👇 КЛИКАЙ ПО МИНЬОНУ 👇</div>
        </div>
        
        <div id="upgrades" class="tab-content">
            <div class="upgrade" data-type="click">
                <div>💪 Сила клика</div>
                <div>+1 банан</div>
                <div>Ур. <span id="clickLvl">0</span></div>
                <button id="clickBtn">🍌 <span id="clickCost">100</span></button>
            </div>
            <div class="upgrade" data-type="energy">
                <div>⚡️ Макс. энергия</div>
                <div>+10 энергии</div>
                <div>Ур. <span id="energyLvl">0</span></div>
                <button id="energyBtn">🍌 <span id="energyCost">100</span></button>
            </div>
            <div class="upgrade" data-type="regen">
                <div>🔋 Реген энергии</div>
                <div>+1/сек</div>
                <div>Ур. <span id="regenLvl">0</span></div>
                <button id="regenBtn">🍌 <span id="regenCost">150</span></button>
            </div>
            <div class="upgrade" data-type="bonus">
                <div>💰 Бонус бананов</div>
                <div>+5% к доходу</div>
                <div>Ур. <span id="bonusLvl">0</span></div>
                <button id="bonusBtn">🍌 <span id="bonusCost">200</span></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
